version: 2

before:
  hooks:
    - go mod tidy
    - go test ./... -race -count=1

builds:
  - main: .
    binary: jot-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/danjdewhurst/jot-cli/cmd.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "jot-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: danjdewhurst
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: jot-cli
    homepage: https://github.com/danjdewhurst/jot-cli
    description: A fast, context-aware notes tool for the terminal
    license: MIT
    install: |
      bin.install "jot-cli"
      bin.install_symlink "jot-cli" => "j"
    test: |
      assert_match "jot-cli", shell_output("#{bin}/jot-cli version")

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
